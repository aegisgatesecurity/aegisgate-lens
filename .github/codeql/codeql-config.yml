name: AegisGate Lens CodeQL Configuration

# =========================================================================
# CodeQL Configuration for the AegisGate Lens repo
# =========================================================================
#
# This file customizes the GitHub Code Scanning default setup.
# Reference:
#   https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/customizing-code-scanning
#
# Suppressions rationale (each entry linked to its source):
#
#   js/bad-tag-filter: src/detectors/from_platform.js:850
#     The flagged regex is the Lens's OWASP LLM02-001 DETECTION
#     pattern (looking for HTML injection attempts in LLM output).
#     It is NOT a sanitizer. CodeQL flags it because an
#     incomplete sanitizer is a security risk; here the
#     incompleteness is the intended behavior (the Lens warns the
#     user; the user decides whether to send).
#
#   js/bad-tag-filter: pen-test/07-f09-opt-in-tamper.mjs:151
#     The /<script>/.test(...) call is a pen-test SENTINEL
#     checking whether a forged storage value contains <script>.
#     Not an HTML filter.
#
#   actions/missing-workflow-permissions: enterprise-test.yml
#     The workflow is gated to `if: false` and never runs. We
#     added an explicit `permissions: contents: read` block to
#     silence the lint, but this filter is a backstop in case the
#     block is removed in the future.
#
#   js/redundant-assignment, js/useless-assignment-to-local:
#     Linter noise. Code patterns like `const x = obj && obj.field`
#     use redundant assignment intentionally to express conditional
#     checks.
#
# =========================================================================

queries:
  - uses: security-and-quality

query-filters:
  # --- Detection regexes (intentional incompleteness) ---

  - exclude:
      id: js/bad-tag-filter
      reason: >
        The flagged regexes are DETECTION patterns (looking for
        prompt-injection attempts in LLM output) and pen-test
        SENTINELS. They are NOT HTML sanitizers. The Lens's design
        is to detect and warn; the user decides whether to send.
        See src/detectors/from_platform.js:850 (OWASP LLM02-001
        detection) and pen-test/07-f09-opt-in-tamper.mjs:151
        (forged-storage sentinel).

  # --- Workflow permissions lint ---

  - exclude:
      id: actions/missing-workflow-permissions
      reason: >
        The enterprise-test workflow is gated to `if: false`
        and never actually runs. We added an explicit
        `permissions: contents: read` block to silence the
        lint. This filter is a backstop in case the block is
        removed in the future.

  # --- Linter noise ---

  - exclude:
      id: js/redundant-assignment
      reason: >
        Linter noise. Code patterns like
        `const x = obj && obj.field` use redundant assignment
        intentionally.
  - exclude:
      id: js/useless-assignment-to-local
      reason: >
        Linter noise. Same as js/redundant-assignment.
