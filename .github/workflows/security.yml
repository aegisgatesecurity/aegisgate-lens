# =========================================================================
# AegisGate Lens - Weekly Security Workflow
# =========================================================================
#
# Runs weekly + on every push. Performs:
#   1. CSP gate (security-csp.test.mjs)
#   2. Bundle signature verification (security-bundle-verification.test.mjs)
#   3. Sender-id validation (security-sender-validation.test.mjs)
#   4. Pen-test attack scripts (pen-test/*.sh + *.mjs)
#   5. npm audit (advisory DB) — even though we have no npm deps, the
#      test runners use Node built-ins which can still have CVEs.
#   6. Trivy filesystem scan (catches secrets in committed files)
#
# Fails on any security regression. Mirrors the Platform repo's
# security.yml approach.
# =========================================================================

name: Security (weekly)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday at 03:00 UTC.
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: CSP gate (Day 10 / F-06)
        run: node test/security-csp.test.mjs

      - name: Bundle signature (Day 8 / F-02)
        run: |
          if [ ! -f lens_ml_build/aegisgate-lens-v0.1.1.bundle ]; then
            echo "::warning::lens_ml_build/aegisgate-lens-v0.1.1.bundle not found; skipping"
            exit 0
          fi
          FIXTURE="$GITHUB_WORKSPACE/lens_ml_build/aegisgate-lens-v0.1.1.bundle" \
            node test/security-bundle-verification.test.mjs

      - name: Sender-id validation (Day 8 / F-01)
        run: node test/security-sender-validation.test.mjs

      - name: Pen-test attacks (Day 11-12)
        run: |
          set +e
          for f in pen-test/*.mjs; do
            echo "=== $f ==="
            node "$f" 2>&1 | tail -5
          done
          for f in pen-test/*.sh; do
            [ -x "$f" ] || continue
            echo "=== $f ==="
            bash "$f" 2>&1 | tail -5 || true
          done

  secret-scan:
    name: Trivy filesystem secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          output: trivy-security-scan.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-scan-${{ github.sha }}
          path: trivy-security-scan.txt

  # CodeQL static analysis is handled by GitHub's default setup
  # (free for public repos). Our custom workflow was conflicting with
  # the default ('CodeQL analyses from advanced configurations cannot
  # be processed when the default setup is enabled'). Disabling
  # our custom step; alerts still appear in the Security tab.
  #
  # codeql:
  #   name: CodeQL static analysis
  #   runs-on: ubuntu-latest
  #   ... (kept for reference, see git history)
