<!DOCTYPE html>
<!--
  src/popup.html — Build-tool placeholder
  ======================================
  The Platform's tools/build-lens-extension/ (in
  consolidated/aegisgate-platform/) has a hardcoded list of required
  source files in main.go:156. It includes "popup.html" as a required
  source file, REGARDLESS of what the manifest's default_popup field says.

  This file satisfies that hardcoded requirement. It is NOT a real UI:
  - The manifest's default_popup points to "welcome.html" (the real on-install
    landing page)
  - This popup.html is a build-time placeholder
  - The Platform's build tool copies it to dist/ but it is never shown to a user

  When the Platform's build tool is updated to read the manifest's
  default_popup field (instead of hardcoding the file list), this stub
  can be removed.

  This stub intentionally:
  - Has no UI (would be misleading if shown to a user)
  - Has a clear comment explaining its purpose
  - Just loads popup.js so the build tool's file-presence check passes
-->
<html>
<head>
  <meta charset="utf-8">
  <title>AegisGate Lens Popup Placeholder</title>
  <!-- This file is intentionally a stub. The real popup UI is in welcome.html. -->
</head>
<body>
  <!-- popup.html is a build-tool placeholder. See comment at top of file. -->
  <script src="popup.js"></script>
</body>
</html>
