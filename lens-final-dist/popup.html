<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AegisGate Lens</title>
  <meta name="viewport" content="width=320, initial-scale=1">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1f2937;
      --color-muted: #6b7280;
      --color-accent: #1e40af;
      --color-warning: #f59e0b;
      --color-border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f172a;
        --color-text: #f1f5f9;
        --color-muted: #94a3b8;
        --color-accent: #60a5fa;
        --color-warning: #fbbf24;
        --color-border: #1e293b;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      margin: 0;
      padding: 16px;
      width: 320px;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
      color: var(--color-accent);
    }
    .version {
      font-size: 11px;
      color: var(--color-muted);
      margin-bottom: 12px;
    }
    .section {
      border-top: 1px solid var(--color-border);
      padding: 12px 0;
    }
    .section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-muted);
      margin: 0 0 8px 0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats {
      font-size: 13px;
      color: var(--color-muted);
    }
    #audit-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }
    #audit-list li {
      padding: 4px 0;
      border-bottom: 1px solid var(--color-border);
    }
    button {
      font: inherit;
      padding: 6px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
    }
    button:hover {
      background: var(--color-border);
    }
    a {
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <h1>🛡️ AegisGate Lens</h1>
  <div class="version" id="version">Lens v0.1.0</div>

  <div class="section">
    <h2>Telemetry</h2>
    <div class="toggle-row">
      <input type="checkbox" id="opt-in-toggle">
      <label for="opt-in-toggle">Share anonymized detections</label>
    </div>
    <p class="stats" id="stats" style="margin-top: 8px;">Loading…</p>
  </div>

  <div class="section">
    <h2>Detection categories</h2>
    <div id="category-toggles"></div>
  </div>

  <div class="section">
    <h2>Local audit log (last 24h)</h2>
    <ul id="audit-list"></ul>
    <button id="clear-local" style="margin-top: 8px;">Clear local history</button>
  </div>

  <div class="section">
    <p class="stats" style="margin: 0;">
      Read our
      <a href="https://aegisgatesecurity.io/lens/privacy" target="_blank" rel="noopener noreferrer">privacy policy</a>.
    </p>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
