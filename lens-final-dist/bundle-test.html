<!DOCTYPE html>
<html><head><title>Bundle Test</title></head>
<body>
<h1>Bundle Verification Test</h1>
<pre id="out">Loading...</pre>
<script src="util/bundle-loader.js"></script>
<script>
  // Test that the bundle can be loaded and verified
  (async () => {
    const out = document.getElementById('out');
    try {
      out.textContent = 'Fetching bundle...';
      const resp = await fetch(chrome.runtime.getURL('vendor/bundles/aegisgate-lens-prompt-injection-v0.2.0.bundle'));
      const bytes = new Uint8Array(await resp.arrayBuffer());
      out.textContent = `Bundle fetched: ${bytes.length} bytes\nParsing...`;

      const parsed = await AegisGateLens.bundleLoader.parseBundle(bytes);
      out.textContent = `✅ Bundle verified successfully!
Version: ${parsed.header.bundle_version}
Files: ${parsed.header.n_files}
File list: ${parsed.models.map(m => m.name).join(', ')}
Payload SHA-256: ${parsed.header.payload_sha256.substring(0, 32)}...
Public key: ${parsed.header.signing_public_key.substring(0, 32)}...

Raw files (binary, in rawFiles):
${Object.keys(parsed.rawFiles || {}).map(k => `  - ${k}: ${parsed.rawFiles[k].length} bytes`).join('\\n')}

Bundle was verified end-to-end in Chrome 120 with strict CSP.`;
    } catch (e) {
      out.textContent = `❌ ERROR: ${e.message}\n${e.stack}`;
    }
  })();
</script>
</body></html>
